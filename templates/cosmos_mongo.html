<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos DB (MongoDB API)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 48px;
            margin-top: 50px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 50px;
        }
        .section {
            background-color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .section h2 {
            margin-bottom: 20px;
        }
        input[type="text"] {
            display: block;
            width: 200px;
            padding: 8px;
            margin: 10px auto;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status-message {
            margin: 20px auto;
            padding: 10px;
            width: 80%;
            max-width: 600px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s, background-color 0.3s;
        }
        #status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #status-message.info {
            background-color: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }
        #nickname-display {
            margin-top: 15px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            font-weight: bold;
            color: #333;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>🌌 Cosmos DB (MongoDB API)</h1>

    <div id="status-message">&nbsp;</div>

    <div class="container">

        <!-- 註冊區塊 -->
        <div class="section">
            <h2>註冊 (Register)</h2>
            <input type="text" placeholder="姓名 (Name)"     id="register-name">
            <input type="text" placeholder="暱稱 (Nickname)" id="register-nickname">
            <button onclick="register()">提交</button>
        </div>

        <!-- 查詢區塊 -->
        <div class="section">
            <h2>查詢 (Search)</h2>
            <input type="text" placeholder="姓名 (Name)" id="search-name">
            <button onclick="search()" style="background-color: #28a745;">查詢</button>
            <div id="nickname-display">在此顯示查詢結果</div>
        </div>

    </div>

    <br>
    <a class="back-link" href="/">← 返回首頁</a>

    <script>
        const API_PREFIX = "/api/cosmos-mongo";
        const statusElement = document.getElementById('status-message');

        function showStatus(message, type = 'info') {
            statusElement.textContent = message;
            statusElement.className = type;
            statusElement.style.opacity = 1;
            clearTimeout(statusElement._t);
            statusElement._t = setTimeout(() => {
                statusElement.style.opacity = 0;
            }, 3000);
        }

        async function register() {
            const name     = document.getElementById('register-name').value.trim();
            const nickname = document.getElementById('register-nickname').value.trim();

            if (!name || !nickname) {
                showStatus("姓名和暱稱欄位不能為空。", 'error');
                return;
            }

            try {
                const response = await fetch(`${API_PREFIX}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, nickname })
                });
                const data = await response.json();
                if (response.ok) {
                    showStatus(data.message, 'success');
                    document.getElementById('register-name').value     = '';
                    document.getElementById('register-nickname').value = '';
                } else {
                    showStatus(`註冊失敗: ${data.message || '連線錯誤'}`, 'error');
                }
            } catch (error) {
                console.error('Register error:', error);
                showStatus('連線後端 API 失敗，請檢查服務。', 'error');
            }
        }

        async function search() {
            const name          = document.getElementById('search-name').value.trim();
            const displayElement = document.getElementById('nickname-display');
            displayElement.textContent = "正在查詢...";
            displayElement.style.color = '#333';

            if (!name) {
                showStatus("請輸入要查詢的姓名。", 'error');
                displayElement.textContent = "在此顯示查詢結果";
                return;
            }

            try {
                const response = await fetch(`${API_PREFIX}/search?name=${encodeURIComponent(name)}`);
                const data     = await response.json();

                if (response.ok) {
                    displayElement.textContent = `姓名: ${name} 暱稱: ${data.nickname}`;
                    displayElement.style.color = '#28a745';
                    showStatus(`成功查詢到使用者 ${name} 的暱稱。`, 'success');
                } else if (response.status === 404) {
                    displayElement.textContent = `找不到名為 "${name}" 的使用者。`;
                    displayElement.style.color = '#dc3545';
                    showStatus(data.message, 'info');
                } else {
                    displayElement.textContent = `查詢失敗: ${data.message || '未知錯誤'}`;
                    displayElement.style.color = '#dc3545';
                    showStatus(`查詢 API 錯誤: ${data.message || '未知錯誤'}`, 'error');
                }
            } catch (error) {
                console.error('Search error:', error);
                displayElement.textContent = "連線失敗。";
                displayElement.style.color = '#dc3545';
                showStatus('連線後端 API 失敗，請檢查服務。', 'error');
            }
        }
    </script>

</body>
</html>
